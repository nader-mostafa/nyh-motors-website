<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - NYH Motors</title>
  <link rel="stylesheet" href="../css/themes.css?v=2"><link rel="stylesheet" href="../css/main.css?v=2">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  

  <link rel="stylesheet" href="login.css?v=2">
</head>
<body style="background:linear-gradient(135deg,#0f0f1a 0%,#1a1a3e 60%,#0f0f1a 100%);min-height:100vh;">
  <div class="auth-bg">
    <div class="auth-card animate-fade-in">
      <div class="auth-card-header">
        <div class="logo"><img src="../../LOGO.png" alt="NYH Motors Logo" style="height: 50px; border-radius: 50%; display: block; margin: 0 auto;"></div>
        <h1>NYH Motors</h1>
        <p>Welcome back - sign in to your account</p>
      </div>
      <div class="auth-card-body">
        <form id="loginForm" action="../dashboard/dashboard.html" class="custom-validate" novalidate>
          <div class="form-group">
            <label for="email">Email Address</label>
            <div class="input-icon-wrap">
              <i class="fa-solid fa-envelope"></i>
              <input type="email" id="email" name="email" placeholder="your@email.com" required>
            </div>
            <span id="email-error" class="error-message"></span>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-icon-wrap">
              <i class="fa-solid fa-lock"></i>
              <input type="password" id="password" name="password" placeholder="********" required>
            </div>
                        <span id="password-error" class="error-message"></span>
            <div style="text-align: right; margin-top: 0.4rem; margin-bottom: 0.8rem;">
              <a href="#" class="custom-link" style="font-size: 0.85rem;" id="forgotPasswordLink">Forgot Password?</a>
            </div>
          </div>
          <button type="submit" class="btn btn-full" style="margin-top:.5rem;">Sign In</button>
        </form>
        <div id="resetPasswordSection" style="display:none;" class="animate-fade-in">
          <h3 style="margin-bottom:1rem;font-size:1.1rem;">Reset Your Password</h3>
          <form id="resetForm" novalidate>
            <div class="form-group">
              <label for="newPassword">New Password</label>
              <div class="input-icon-wrap">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="newPassword" placeholder="********" required>
              </div>
            </div>
            <div class="form-group">
              <label for="confirmPassword">Confirm Password</label>
              <div class="input-icon-wrap">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="confirmPassword" placeholder="********" required>
              </div>
            </div>
            <button type="submit" class="btn btn-full" style="margin-top:.5rem;">Confirm New Password</button>
            <p class="text-center" style="margin-top:1rem;font-size:.85rem;">
              <a href="#" id="cancelResetLink" class="custom-link">Cancel</a>
            </p>
          </form>
        </div>
        <div id="loginExtras"><div class="auth-divider"><span>New to NYH Motors?</span></div>
        <a href="../register/register.html" class="btn btn-dark btn-full" style="text-align:center;display:block;">Create an Account</a>
        </div>
      </div>
    </div>
  </div>
  <script src="../js/main.js?v=2"></script>
  <script src="../js/validation.js?v=2"></script>
  

  <script src="login.js?v=2"></script>
</body>
</html>
