<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — NYH Motors</title>
  <link rel="stylesheet" href="css/themes.css"><link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .auth-bg{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;background:linear-gradient(135deg,#0f0f1a 0%,#1a1a3e 60%,#0f0f1a 100%);}
    .auth-card{width:100%;max-width:480px;background:var(--card-bg);border-radius:24px;box-shadow:0 24px 80px rgba(0,0,0,.3);overflow:hidden;}
    .auth-card-header{background:linear-gradient(135deg,#0f0f1a,#1a1a3e);padding:2.5rem;text-align:center;}
    .auth-card-header h1{color:#fff;font-size:1.5rem;margin:0;}
    .auth-card-header p{color:rgba(255,255,255,.6);font-size:.88rem;margin:.4rem 0 0;}
    .auth-card-header .logo{font-size:2rem;margin-bottom:.5rem;}
    .auth-card-body{padding:2.5rem;}
    .auth-divider{text-align:center;margin:1.5rem 0;position:relative;}
    .auth-divider::before{content:'';position:absolute;left:0;right:0;top:50%;height:1px;background:var(--border-color);}
    .auth-divider span{background:var(--card-bg);position:relative;padding:0 1rem;color:#888;font-size:.82rem;}
    .btn-full{width:100%;padding:1rem;font-size:1rem;}
  </style>
</head>
<body style="background:linear-gradient(135deg,#0f0f1a 0%,#1a1a3e 60%,#0f0f1a 100%);min-height:100vh;">
  <div class="auth-bg">
    <div class="auth-card animate-fade-in">
      <div class="auth-card-header">
        <div class="logo"><img src="../LOGO.png" alt="NYH Motors Logo" style="height: 50px; border-radius: 50%; display: block; margin: 0 auto;"></div>
        <h1>NYH Motors</h1>
        <p>Welcome back — sign in to your account</p>
      </div>
      <div class="auth-card-body">
        <form action="dashboard.html" class="custom-validate" novalidate>
          <div class="form-group">
            <label for="email">Email Address</label>
            <div class="input-icon-wrap">
              <i class="fa-solid fa-envelope"></i>
              <input type="email" id="email" name="email" placeholder="your@email.com" required>
            </div>
            <span id="email-error" class="error-message"></span>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-icon-wrap">
              <i class="fa-solid fa-lock"></i>
              <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            <span id="password-error" class="error-message"></span>
          </div>
          <button type="submit" class="btn btn-full" style="margin-top:.5rem;">Sign In</button>
        </form>
        <div class="auth-divider"><span>New to NYH Motors?</span></div>
        <a href="register.html" class="btn btn-dark btn-full" style="text-align:center;display:block;">Create an Account</a>
        <p class="text-center" style="margin-top:1.5rem;font-size:.85rem;color:#888;">
          <a href="index.html" class="custom-link"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
        </p>
      </div>
    </div>
  </div>
  <script src="js/main.js"></script>
  <script src="js/validation.js"></script>
  <script>
    // Override form submission to handle role-based login
    document.querySelector('form').addEventListener('submit', function(e) {
      e.preventDefault();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      if (!email || !password) return; // let validation.js handle empty
      if (email === 'admin@nyhmotors.com' && password === 'admin123') {
        localStorage.setItem('userRole', 'admin');
        window.location.href = 'admin.html';
      } else {
        localStorage.setItem('userRole', 'user');
        window.location.href = 'dashboard.html';
      }
    });
  </script>
</body>
</html>
