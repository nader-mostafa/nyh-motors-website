<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - NYH Motors</title>
  <link rel="stylesheet" href="../css/themes.css?v=2"><link rel="stylesheet" href="../css/main.css?v=2">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  

  <link rel="stylesheet" href="register.css?v=2">
</head>
<body style="background:linear-gradient(135deg,#0f0f1a 0%,#1a1a3e 60%,#0f0f1a 100%);min-height:100vh;">
  <div class="auth-bg">
    <div class="auth-card animate-fade-in">
      <div class="auth-card-header">
        <div class="logo"><img src="../../LOGO.png" alt="NYH Motors Logo" style="height: 50px; border-radius: 50%; display: block; margin: 0 auto;"></div>
        <h1>Join NYH Motors</h1>
        <p>Create your account and start exploring</p>
      </div>
      <div class="auth-card-body">
        <form action="../login/login.html" class="custom-validate" novalidate>
          <div class="form-group">
            <label for="fullname">Full Name</label>
            <div class="input-icon-wrap">
              <i class="fa-solid fa-user"></i>
              <input type="text" id="fullname" name="FullName" placeholder="Yara El-saed" required>
            </div>
            <span id="fullname-error" class="error-message"></span>
          </div>
          <div class="form-group">
            <label for="email">Email Address</label>
            <div class="input-icon-wrap">
              <i class="fa-solid fa-envelope"></i>
              <input type="email" id="email" name="email" placeholder="your@email.com" required>
            </div>
            <span id="email-error" class="error-message"></span>
          </div>
          <div class="form-group">
            <label for="phone">Phone Number</label>
            <div class="input-icon-wrap">
              <i class="fa-solid fa-phone"></i>
              <input type="tel" id="phone" name="phone" placeholder="+20 012 123 4567">
            </div>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-icon-wrap">
              <i class="fa-solid fa-lock"></i>
              <input type="password" id="password" name="password" placeholder="â€¢â€¢â€¢â€¢â€¢â€¢â€¢â€¢" required>
            </div>
            <span id="password-error" class="error-message"></span>
          </div>
          <button type="submit" class="btn btn-full" style="margin-top:.5rem;">Create Account</button>
        </form>
        <div class="auth-divider"><span>Already have an account?</span></div>
        <a href="../login/login.html" class="btn btn-dark btn-full" style="text-align:center;display:block;">Sign In</a>
        <p class="text-center" style="margin-top:1.5rem;font-size:.85rem;color:#888;">
          <a href="../index/index.html" class="custom-link"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
        </p>
      </div>
    </div>
  </div>
  <script src="../js/main.js?v=2"></script>
  <script src="../js/validation.js?v=2"></script>

  <script src="register.js?v=2"></script>
</body>
</html>
